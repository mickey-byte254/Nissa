<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy 18th Birthday!</title>

    <!-- Mobile Web App Metadata -->
    <meta name="theme-color" content="#1a120b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <style>
        :root {
            --bg-color: #1a120b;          /* Deep rich chocolate dark brown */
            --text-color: #f5f2eb;        /* Soft premium cream */
            --accent-color: #d4af37;      /* Metallic gold */
            --secondary-accent: #aa7c11;  /* Warm bronze */
            --card-bg: rgba(30, 22, 15, 0.65); /* Semi-transparent for glassmorphism */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Continuous Gold Confetti Animation */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            background-image: 
                radial-gradient(circle, var(--accent-color) 10%, transparent 11%),
                radial-gradient(circle, var(--secondary-accent) 10%, transparent 11%),
                radial-gradient(circle, #fff 5%, transparent 6%);
            background-size: 400px 400px, 350px 350px, 500px 500px;
            background-position: 0 0, 40px 60px, 130px 270px;
            animation: confettiRain 12s linear infinite;
            opacity: 0.25;
        }

        @keyframes confettiRain {
            0% { background-position: 0 0, 40px 60px, 130px 270px; }
            100% { background-position: 0 400px, 40px 410px, 130px 770px; }
        }

        .container {
            width: 100%;
            max-width: 600px; /* Perfectly optimized for modern mobile screen bounds */
            text-align: center;
            z-index: 2; /* Sits above the confetti background layer */
        }

        header {
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff 10%, var(--accent-color) 60%, var(--secondary-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 12px rgba(212, 175, 55, 0.15);
        }

        .subtitle {
            font-size: 1.1rem;
            color: #a4998e;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .stats-section-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-color);
            margin-bottom: 20px;
            font-weight: 600;
        }

        .stats-container {
            display: grid;
            grid-template-columns: 1fr; /* Default to mobile vertical stacking layout */
            gap: 16px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid rgba(214, 175, 55, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .stat-card:active {
            transform: scale(0.98); /* Touch feedback scale effect on mobile tap */
        }

        .stat-num {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--accent-color);
            margin-bottom: 6px;
            line-height: 1;
        }

        .stat-label {
            font-size: 0.95rem;
            color: #d4cebc;
            font-weight: 500;
        }

        .cta-wrapper {
            margin-top: 10px;
        }

        .cta-label {
            display: block;
            font-size: 0.8rem;
            color: #8c7e74;
            margin-bottom: 8px;
            font-family: monospace;
        }

        .cta-btn {
            background: linear-gradient(135deg, var(--accent-color), var(--secondary-accent));
            color: #1a120b;
            border: none;
            padding: 18px 40px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            width: 100%; /* Spans comfortably across mobile screens for full-width thumb target */
            max-width: 320px;
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .cta-btn:active {
            transform: scale(0.96);
            box-shadow: 0 3px 10px rgba(212, 175, 55, 0.2);
        }

        /* Responsive Breakpoint handling for Desktop/Tablet Viewports */
        @media (min-width: 600px) {
            h1 { font-size: 3.5rem; }
            .stats-container {
                grid-template-columns: repeat(3, 1fr); /* Reverts cleanly back to side-by-side on wide screens */
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Happy 18th Birthday!</h1>
            <p class="subtitle">Welcome to Version 18.0 — The Ultimate Update</p>
        </header>

        <p class="stats-section-title">Celebrating Our Friendship Stats</p>

        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-num">18</div>
                <div class="stat-label">Years of Being Awesome</div>
            </div>
            <div class="stat-card">
                <div class="stat-num">∞</div>
                <div class="stat-label">Inside Jokes Shared</div>
            </div>
            <div class="stat-card">
                <div class="stat-num">Best</div>
                <div class="stat-label">Friend Status Locked</div>
            </div>
        </div>

        <div class="cta-wrapper">
            <span class="cta-label">.Call to Action</span>
            <button class="cta-btn" onclick="celebrate()">Click for a Surprise</button>
        </div>
    </div>

    <script>
        function celebrate() {
            // Replaces the basic alert with an interactive mobile prompt
            alert("🎉 Happy 18th Birthday! Your real gift is waiting on your phone!");
        }
    </script>
</body>
</html>
